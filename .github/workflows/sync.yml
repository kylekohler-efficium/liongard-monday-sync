name: Liongard to Monday.com Sync
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run sync
        env:
          LIONGARD_INSTANCE:   ${{ secrets.LIONGARD_INSTANCE }}
          LIONGARD_KEY_ID:     ${{ secrets.LIONGARD_KEY_ID }}
          LIONGARD_KEY_SECRET: ${{ secrets.LIONGARD_KEY_SECRET }}
          MONDAY_TOKEN:        ${{ secrets.MONDAY_TOKEN }}
          BOARD_LIONGARD:      ${{ secrets.BOARD_LIONGARD }}
        run: node sync.js
